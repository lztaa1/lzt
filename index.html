                    solution: `import pandas as pd
import random
random.seed(42)

data = []

    [25, 200, 1], [30, 500, 0], [45, 800, 0],

    [28, 400, 0], [40, 700, 0], [22, 150, 1],

# 1. Gini不纯度
def gini(labels):
    n = len(labels)
    if n == 0:
        return 0
    counts = {}
    for l in labels:
        counts[l] = counts.get(l, 0) + 1
    return 1 - sum((c / float(n)) ** 2 for c in counts.values())

# 2. 简化决策树
def build_tree(data, max_depth=3):
    labels = [d[2] for d in data]
    if len(set(labels)) == 1 or max_depth == 0 or len(data) < 2:
        return {'leaf': True, 'value': round(sum(labels) / len(labels))}
    best_g = 1
    best_f = -1
    best_t = 0
    for f in [0, 1]:
        vals = sorted(set(d[f] for d in data))
        for i in range(len(vals) - 1):
            t = (vals[i] + vals[i + 1]) / 2.0
            left_l = [d[2] for d in data if d[f] <= t]
            right_l = [d[2] for d in data if d[f] > t]
            if not left_l or not right_l:
                continue
            g = (len(left_l) * gini(left_l) + len(right_l) * gini(right_l)) / len(data)
            if g < best_g:
                best_g = g
                best_f = f
                best_t = t
    if best_f == -1:
        return {'leaf': True, 'value': round(sum(labels) / len(labels))}
    left_d = [d for d in data if d[best_f] <= best_t]
    right_d = [d for d in data if d[best_f] > best_t]
    return {
        'leaf': False,
        'feature': best_f,
        'threshold': best_t,
        'left': build_tree(left_d, max_depth - 1),
        'right': build_tree(right_d, max_depth - 1)
    }

def predict(tree, sample):
    if tree['leaf']:
        return tree['value']
    if sample[tree['feature']] <= tree['threshold']:
        return predict(tree['left'], sample)
    else:
        return predict(tree['right'], sample)

# 3. 训练3棵树并预测

# 1. RFM打分
def r_score(d):
    if d <= 7: return 5
    if d <= 15: return 4
    if d <= 30: return 3
    if d <= 60: return 2
    return 1

def f_score(o):
    if o >= 15: return 5
    if o >= 10: return 4
    if o >= 5: return 3
    if o >= 3: return 2
    return 1

def m_score(a):
    if a >= 4000: return 5
    if a >= 2500: return 4
    if a >= 1000: return 3
    if a >= 500: return 2
    return 1

print("=== RFM分层 ===")
segments = {}
for u in users:
    rs = r_score(u['last_days'])
    fs = f_score(u['orders'])
    ms = m_score(u['total_amount'])
    total = rs + fs + ms
    u['rfm'] = total
    if total >= 13:
        seg = '高价值'
    elif total >= 10:
        seg = '潜力'
    elif total >= 7:
        seg = '一般'
    else:
        seg = '流失'
    u['segment'] = seg
    segments.setdefault(seg, []).append(u)
    print("  %s: R=%d F=%d M=%d 总分=%d -> %s" % (
        u['id'], rs, fs, ms, total, seg))

# 2. 相关系数
n = len(users)
x = [u['orders'] for u in users]
y = [u['total_amount'] for u in users]
mx = sum(x) / n
my = sum(y) / n
cov = sum((x[i] - mx) * (y[i] - my) for i in range(n)) / n
sx = (sum((xi - mx) ** 2 for xi in x) / n) ** 0.5
sy = (sum((yi - my) ** 2 for yi in y) / n) ** 0.5
r = cov / (sx * sy)

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python数据分析学习平台</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- CodeMirror CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #252542;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b0;
            --accent-blue: #4facfe;
            --accent-purple: #a18cd1;
            --accent-green: #43e97b;
            --accent-orange: #fa709a;
            --border-color: #2a2a4a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .progress-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        /* Cover Page */
        .cover-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem;
            animation: fadeIn 0.5s ease;
        }
        
        .cover-hero {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .cover-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #fa709a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .cover-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        .cover-stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 3rem;
        }
        
        .stat-item {
            background: var(--bg-secondary);
            padding: 1.5rem 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-blue);
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        /* Project Cards Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            width: 100%;
        }
        
        .project-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--card-gradient);
            opacity: 0.8;
        }
        
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border-color: var(--accent-purple);
        }
        
        .project-card.completed::after {
            content: '[OK]';
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent-green);
            color: #000;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .card-number {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        .card-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .card-tag {
            background: var(--bg-tertiary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        /* Card gradients */
        .card-1 { --card-gradient: linear-gradient(90deg, #4facfe, #00f2fe); }
        .card-2 { --card-gradient: linear-gradient(90deg, #667eea, #764ba2); }
        .card-3 { --card-gradient: linear-gradient(90deg, #f093fb, #f5576c); }
        .card-4 { --card-gradient: linear-gradient(90deg, #4facfe, #00f2fe); }
        .card-5 { --card-gradient: linear-gradient(90deg, #43e97b, #38f9d7); }
        .card-6 { --card-gradient: linear-gradient(90deg, #fa709a, #fee140); }
        .card-7 { --card-gradient: linear-gradient(90deg, #a18cd1, #fbc2eb); }
        .card-8 { --card-gradient: linear-gradient(90deg, #ff9a9e, #fecfef); }
        .card-9 { --card-gradient: linear-gradient(90deg, #ffecd2, #fcb69f); }
        .card-10 { --card-gradient: linear-gradient(90deg, #667eea, #764ba2); }
        
        /* Detail Page */
        .detail-page {
            display: none;
            padding: 2rem;
            animation: slideIn 0.3s ease;
        }
        
        .detail-page.active {
            display: block;
        }
        
        .cover-page.hidden {
            display: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2rem;
        }
        
        .back-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-purple);
        }
        
        /* Project Header */
        .project-header {
            margin-bottom: 2rem;
        }
        
        .project-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .project-desc {
            font-size: 1rem;
            color: var(--text-secondary);
        }
        
        /* Mode Tabs */
        .mode-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .mode-tab {
            padding: 0.75rem 2rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .mode-tab:hover {
            border-color: var(--accent-blue);
        }
        
        .mode-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }
        
        /* Content Sections */
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        /* Learn Mode Styles */
        .concept-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }
        
        .concept-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .concept-text {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }
        
        .concept-highlight {
            background: linear-gradient(135deg, rgba(79,172,254,0.2) 0%, rgba(161,140,209,0.2) 100%);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent-blue);
            margin: 1rem 0;
        }
        
        .step-container {
            margin: 2rem 0;
        }
        
        .step-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .step-title {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .code-block {
            background: #1e1e2e;
            border-radius: 8px;
            overflow: hidden;
            margin: 1rem 0;
        }
        
        .code-header {
            background: #2d2d44;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .code-lang {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .code-content {
            padding: 1rem;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            overflow-x: auto;
        }
        
        .explanation-box {
            background: rgba(67,233,123,0.1);
            border: 1px solid rgba(67,233,123,0.3);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin: 1rem 0;
        }
        
        .explanation-title {
            color: var(--accent-green);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Quiz Styles */
        .quiz-container {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 2rem;
        }
        
        .quiz-title {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }
        
        .quiz-question {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        
        .quiz-option {
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .quiz-option:hover {
            border-color: var(--accent-blue);
        }
        
        .quiz-option.correct {
            background: rgba(67,233,123,0.2);
            border-color: var(--accent-green);
        }
        
        .quiz-option.wrong {
            background: rgba(250,112,154,0.2);
            border-color: var(--accent-orange);
        }
        
        /* Practice Mode Styles */
        .task-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }
        
        .task-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-orange);
        }
        
        .task-list {
            list-style: none;
            padding: 0;
        }
        
        .task-list li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }
        
        .task-list li::before {
            content: "[ ]";
            position: absolute;
            left: 0;
            color: var(--accent-blue);
        }
        
        .task-list li.completed::before {
            content: "[OK]";
            color: var(--accent-green);
        }
        
        /* Editor Area */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            height: 500px;
        }
        
        .editor-panel, .output-panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .panel-header {
            background: var(--bg-tertiary);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }
        
        .CodeMirror {
            height: calc(100% - 50px);
            font-size: 14px;
        }
        
        .output-content {
            height: calc(100% - 50px);
            padding: 1rem;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .toolbar {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-tool {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-tool:hover {
            background: var(--bg-tertiary);
        }
        
        .btn-run {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        
        .btn-run:hover {
            opacity: 0.9;
        }
        
        /* Answer Section */
        .answer-section {
            margin-top: 2rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            display: none;
        }
        
        .answer-section.show {
            display: block;
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .editor-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .editor-panel, .output-panel {
                height: 400px;
            }
        }
        
        @media (max-width: 768px) {
            .cover-stats {
                flex-wrap: wrap;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .cover-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-title" onclick="showCoverPage()">
            <i class="bi bi-mortarboard-fill"></i>
            Python数据分析学习平台
        </div>
        <div class="progress-badge">
            <i class="bi bi-trophy"></i>
            学习进度: <span id="progress-text">0/10</span>
        </div>
    </header>
    
    <!-- Cover Page -->
    <div id="cover-page" class="cover-page">
        <div class="cover-hero">
            <h1 class="cover-title">Python数据分析学习平台</h1>
            <p class="cover-subtitle">10个项目从入门到实战 | 讲解+练习双模式</p>
            
            <div class="cover-stats">
                <div class="stat-item">
                    <div class="stat-number">10</div>
                    <div class="stat-label">实战项目</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">30+</div>
                    <div class="stat-label">核心技能</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">100%</div>
                    <div class="stat-label">在线练习</div>
                </div>
            </div>
        </div>
        
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--text-secondary);">
            <i class="bi bi-grid-fill"></i> 选择你的学习项目
        </h2>
        
        <div id="projects-grid" class="projects-grid">
            <!-- Generated by JS -->
        </div>
    </div>
    
    <!-- Detail Page -->
    <div id="detail-page" class="detail-page">
        <div class="back-btn" onclick="showCoverPage()">
            <i class="bi bi-arrow-left"></i>
            返回项目列表
        </div>
        
        <div class="project-header">
            <h1 id="project-title" class="project-title">项目1: 数据预处理</h1>
            <p id="project-desc" class="project-desc">学习数据清洗、缺失值处理、异常值检测等核心技能</p>
        </div>
        
        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <div class="mode-tab active" data-mode="learn" onclick="switchMode('learn')">

                讲解模式

                <i class="bi bi-pencil-fill"></i>
                练习模式

        <!-- Learn Mode Content -->
        <div id="learn-content" class="content-section active">
            <!-- Dynamic content -->
        </div>
        
        <!-- Practice Mode Content -->
        <div id="practice-content" class="content-section">
            <!-- Dynamic content -->
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
    
    <script>
        // ==================== 项目数据 ====================
        const projects = [
            {
                id: 1,
                title: "数据预处理",
                desc: "学习数据清洗、缺失值处理、异常值检测等核心技能",
                tags: ["数据清洗", "缺失值", "异常值", "特征工程"],
                learn: {
                    concept: {
                        title: "什么是数据预处理？",
                        content: `
                            <p class="concept-text">
                                原始数据往往存在<strong>缺失、错误、格式不一致</strong>等问题，就像做菜前需要洗菜切菜一样，
                                数据分析前必须先进行预处理。
                            </p>
                            <div class="concept-highlight">
                                <strong>核心思想：</strong>"垃圾进，垃圾出" — 数据质量直接决定分析结果的质量
                            </div>
                            <p class="concept-text">
                                <strong>常见预处理操作：</strong>
                            </p>
                            <ul class="concept-text">
                                <li>[OK] <strong>缺失值处理</strong> — 填空补全</li>
                                <li>[OK] <strong>异常值处理</strong> — 剔除错误</li>
                                <li>[OK] <strong>特征工程</strong> — 创造新信息</li>
                                <li>[OK] <strong>数据标准化</strong> — 统一尺度</li>
                            </ul>
                        `
                    },
                    steps: [
                        {
                            number: 1,
                            title: "读取数据",
                            code: `import pandas as pd

# 读取用户行为数据
df = pd.read_csv("user_behavior.csv")

# 查看数据基本信息
print("数据形状:", df.shape)
print("前5行数据:")
print(df.head())
print("数据信息:")
print(df.info())`,
                            explanation: "shape看数据规模（行数、列数），head()看前几行了解字段内容，info()查看数据类型和缺失情况"
                        },
                        {
                            number: 2,
                            title: "缺失值处理",
                            code: `# 查看缺失值统计
print("缺失值统计:")
print(df.isnull().sum())

# 数值型用中位数填充（不受极端值影响）
df['消费金额'] = df['消费金额'].fillna(df['消费金额'].median())
df['消费频次'] = df['消费频次'].fillna(df['消费频次'].median())

# 类别型用"未知"填充
df['性别'] = df['性别'].fillna('未知')
df['地区'] = df['地区'].fillna('未知')

print("填充后缺失值:")
print(df.isnull().sum())`,
                            explanation: "<strong>为什么用中位数而不是均值？</strong><br>中位数不受极端值影响，更稳健。比如收入数据，少数富豪会拉高均值，但中位数更能代表普通人水平。"
                        },
                        {
                            number: 3,
                            title: "异常值检测（3sigma原则）",
                            code: `# 计算均值和标准差
mean = df['消费金额'].mean()
std = df['消费金额'].std()

# 计算3sigma边界
lower_bound = mean - 3 * std
upper_bound = mean + 3 * std

print("均值: %.2f" % mean)
print("标准差: %.2f" % std)
print("正常范围: [%.2f, %.2f]" % (lower_bound, upper_bound))

# 找出异常值
outliers = df[(df['消费金额'] < lower_bound) | (df['消费金额'] > upper_bound)]
print("异常值数量:", len(outliers))

import math
random.seed(42)

# 模拟数据
data = []
for i in range(100):
    amount = round(random.uniform(50, 1000), 2) if random.random() > 0.1 else None
    freq = random.randint(1, 12) if random.random() > 0.15 else None
    data.append({
        '用户ID': 'U%04d' % (i+1),
        '消费金额': amount,
        '消费频次': freq

for row in data[:5]:
    print(row)

# 统计缺失值
missing_amount = sum(1 for d in data if d['消费金额'] is None)
missing_freq = sum(1 for d in data if d['消费频次'] is None)
print("缺失值统计:")

print("  消费频次缺失:", missing_freq)

# 计算消费金额中位数
amounts = [d['消费金额'] for d in data if d['消费金额'] is not None]
amounts_sorted = sorted(amounts)
median_amount = amounts_sorted[len(amounts_sorted) // 2]

# 计算消费频次中位数
freqs = [d['消费频次'] for d in data if d['消费频次'] is not None]
freqs_sorted = sorted(freqs)
median_freq = freqs_sorted[len(freqs_sorted) // 2]

# 填充缺失值
for d in data:
    if d['消费金额'] is None:
        d['消费金额'] = median_amount
    if d['消费频次'] is None:
        d['消费频次'] = median_freq

print("填充后数据:")
for row in data[:5]:
    print(row)

# 2. 3sigma原则找异常值
mean = sum(amounts) / len(amounts)
variance = sum((x - mean) ** 2 for x in amounts) / len(amounts)
std = math.sqrt(variance)

upper = mean + 3 * std
lower = mean - 3 * std

print("均值: %.2f" % mean)
print("标准差: %.2f" % std)
print("正常范围: [%.2f, %.2f]" % (lower, upper))

outliers = [d for d in data if d['消费金额'] > upper or d['消费金额'] < lower]
print("异常值数量:", len(outliers))
if outliers:
    print("异常值示例:")
    for o in outliers[:3]:
        print("  ", o)

# 3. 分桶

    elif d['消费金额'] <= 500:
        buckets['中消费'] += 1
    else:
        buckets['高消费'] += 1

print("消费等级分布:")
for level, count in buckets.items():
    print("  %s: %d人" % (level, count))

print("预处理完成!")

# 1. 描述统计
def describe(data_list, name):
    n = len(data_list)
    mean = sum(data_list) / n
    variance = sum((x - mean) ** 2 for x in data_list) / n
    std = math.sqrt(variance)
    sorted_data = sorted(data_list)
    min_val = sorted_data[0]
    max_val = sorted_data[-1]
    median = sorted_data[n // 2]
    
    print("%s:" % name)
    print("  计数: %d" % n)
    print("  均值: %.2f" % mean)
    print("  标准差: %.2f" % std)
    print("  最小值: %.2f" % min_val)
    print("  中位数: %.2f" % median)
    print("  最大值: %.2f" % max_val)

# 提取各列
ads = [d['广告费'] for d in data]
freqs = [d['活动次数'] for d in data]
prices = [d['客单价'] for d in data]
sales = [d['销量'] for d in data]

describe(ads, '广告费')
describe(freqs, '活动次数')
describe(prices, '客单价')
describe(sales, '销量')

# 2. 计算皮尔逊相关系数
def pearson_corr(x, y):
    n = len(x)
    mean_x = sum(x) / n
    mean_y = sum(y) / n
    
    numerator = sum((xi - mean_x) * (yi - mean_y) for xi, yi in zip(x, y))
    denominator = math.sqrt(sum((xi - mean_x) ** 2 for xi in x) * sum((yi - mean_y) ** 2 for yi in y))
    
    if denominator == 0:
        return 0
    return numerator / denominator

# 3. 计算各指标与销量的相关性
corr_ad = pearson_corr(ads, sales)
corr_freq = pearson_corr(freqs, sales)
corr_price = pearson_corr(prices, sales)

print("与销量的相关性:")
print("  广告费: %.3f" % corr_ad)
print("  活动次数: %.3f" % corr_freq)
print("  客单价: %.3f" % corr_price)

# 找出最强的
corrs = [('广告费', corr_ad), ('活动次数', corr_freq), ('客单价', corr_price)]
corrs.sort(key=lambda x: abs(x[1]), reverse=True)
print("相关性最强的是: %s (r=%.3f)" % (corrs[0][0], corrs[0][1]))

print("分析完成!")

                desc: "学习移动平均、趋势识别、基于趋势外推的预测",
                tags: ["时间序列", "移动平均", "预测"],
                learn: {
                    concept: { title: "什么是时间序列分析？", content: "<p class='concept-text'>分析数据随时间变化的规律。</p>" },
                    steps: [{ number: 1, title: "移动平均", code: "# 3月移动平均", explanation: "平滑数据看趋势" }],
                    quiz: [{ question: "移动平均的作用？", options: ["A.平滑波动", "B.增加波动", "C.无关"], correct: 0 }]
                },
                practice: { tasks: ["销量预测"], template: "# TODO", solution: "# 答案" }
            },
            {
                id: 9,
                title: "异常检测",
                desc: "学习3sigma原则、IQR方法、异常类型分类",
                tags: ["异常检测", "3sigma", "IQR"],
                learn: {
                    concept: { title: "什么是异常检测？", content: "<p class='concept-text'>识别数据中'不正常'的记录。</p>" },
                    steps: [{ number: 1, title: "3sigma检测", code: "# 3sigma原则", explanation: "超出均值+/-3倍标准差" }],
                    quiz: [{ question: "IQR方法用哪个分位数？", options: ["A.均值", "B.四分位数", "C.中位数"], correct: 1 }]
                },
                practice: { tasks: ["异常值检测"], template: "# TODO", solution: "# 答案" }
            },
            {
                id: 10,
                title: "综合项目",
                desc: "整合所有技能：预处理->分析->建模->结论",
                tags: ["综合实战", "全流程", "业务建议"],
                learn: {
                    concept: { title: "综合数据分析", content: "<p class='concept-text'>整合所有技能：预处理 -> 分析 -> 建模 -> 结论。</p><div class='concept-highlight'>核心目标：如何提升营收？通过数据驱动的方式发现问题、找到机会、提出策略。</div>" },
                    steps: [{ number: 1, title: "全流程分析", code: "# 综合分析代码", explanation: "从数据到策略" }],
                    quiz: [{ question: "好的分析报告要回答？", options: ["A.发现了什么", "B.为什么", "C.怎么办", "D.以上全部"], correct: 3 }]
                },
                practice: { tasks: ["输出3条业务建议"], template: "# TODO: 综合分析", solution: "# 答案" }
            }
        ];
        
        // ==================== 全局状态 ====================
        let currentProject = 1;
        let currentMode = 'learn';
        let editor = null;
        let completedProjects = JSON.parse(localStorage.getItem('completedProjects') || '[]');
        
        // ==================== 初始化 ====================
        function init() {
            renderProjectCards();
            updateProgress();
        }
        
        // ==================== 渲染项目卡片 ====================
        function renderProjectCards() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = projects.map(p => `
                <div class="project-card card-${p.id} ${completedProjects.includes(p.id) ? 'completed' : ''}"
                     onclick="showDetailPage(${p.id})">
                    <div class="card-number">${p.id}</div>
                    <div class="card-title">${p.title}</div>
                    <div class="card-desc">${p.desc}</div>
                    <div class="card-tags">
                        ${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // ==================== 显示封面页 ====================
        function showCoverPage() {
            document.getElementById('cover-page').classList.remove('hidden');
            document.getElementById('detail-page').classList.remove('active');
            renderProjectCards();
        }
        
        // ==================== 显示详情页 ====================
        function showDetailPage(id) {
            currentProject = id;
            const project = projects.find(p => p.id === id);
            
            document.getElementById('cover-page').classList.add('hidden');
            document.getElementById('detail-page').classList.add('active');
            
            // 更新标题
            document.getElementById('project-title').textContent = '项目' + id + ': ' + project.title;
            document.getElementById('project-desc').textContent = project.desc;
            
            // 渲染学习内容
            renderLearnContent(project.learn);
            
            // 渲染练习内容
            renderPracticeContent(project.practice);
            
            // 重置模式
            switchMode('learn');
        }
        
        // ==================== 渲染学习内容 ====================
        function renderLearnContent(learn) {
            const container = document.getElementById('learn-content');
            
            if (!learn.concept) {
                container.innerHTML = '<p>内容加载中...</p>';
                return;
            }
            
            container.innerHTML = `
                <div class="concept-card">
                    <h2 class="concept-title">
                        <i class="bi bi-lightbulb-fill text-warning"></i>
                        ${learn.concept.title}
                    </h2>
                    ${learn.concept.content}
                </div>
                
                ${learn.steps ? `
                <h3 class="mb-3"><i class="bi bi-code-square"></i> 代码演示</h3>
                ${learn.steps.map(step => `
                    <div class="step-container">
                        <div class="step-header">
                            <div class="step-number">${step.number}</div>
                            <div class="step-title">${step.title}</div>
                        </div>
                        <div class="code-block">
                            <div class="code-header">
                                <span class="code-lang">Python</span>
                                <button class="btn-tool" onclick="copyCode(this)">
                                    <i class="bi bi-clipboard"></i> 复制
                                </button>
                            </div>
                            <pre class="code-content"><code>${escapeHtml(step.code)}</code></pre>
                        </div>
                        <div class="explanation-box">
                            <div class="explanation-title"><i class="bi bi-info-circle"></i> 代码解释</div>
                            <div>${step.explanation}</div>
                        </div>
                    </div>
                `).join('')}
                ` : ''}
                
                ${learn.quiz ? `
                <div class="quiz-container">
                    <h3 class="quiz-title"><i class="bi bi-question-circle-fill"></i> 知识检查</h3>
                    ${learn.quiz.map((q, idx) => `
                        <div class="quiz-question">
                            <div><strong>Q${idx + 1}:</strong> ${q.question}</div>
                            <div class="quiz-options">
                                ${q.options.map((opt, optIdx) => `
                                    <div class="quiz-option" onclick="checkAnswer(this, ${optIdx === q.correct}, ${idx})">
                                        ${opt}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
            `;
        }
        
        // ==================== 渲染练习内容 ====================
        function renderPracticeContent(practice) {
            const container = document.getElementById('practice-content');
            
            if (!practice || !practice.tasks) {
                container.innerHTML = '<p>练习内容加载中...</p>';
                return;
            }
            
            container.innerHTML = `
                <div class="task-card">
                    <h3 class="task-title"><i class="bi bi-list-task"></i> 练习任务</h3>
                    <ul class="task-list">
                        ${practice.tasks.map((task, idx) => `
                            <li id="task-${idx}">${task}</li>
                        `).join('')}
                    </ul>
                </div>
                
                <div class="editor-container">
                    <div class="editor-panel">
                        <div class="panel-header">
                            <div class="panel-title"><i class="bi bi-code-slash"></i> 代码编辑器</div>
                            <div class="toolbar">
                                <button class="btn-tool" onclick="resetCode()">
                                    <i class="bi bi-arrow-counterclockwise"></i> 重置
                                </button>
                                <button class="btn-tool btn-run" onclick="runCode()">
                                    <i class="bi bi-play-fill"></i> 运行
                                </button>
                            </div>
                        </div>
                        <textarea id="practice-code">${practice.template || ''}</textarea>
                    </div>
                    
                    <div class="output-panel">
                        <div class="panel-header">
                            <div class="panel-title"><i class="bi bi-terminal"></i> 输出</div>
                            <button class="btn-tool" onclick="clearOutput()">
                                <i class="bi bi-trash"></i> 清空
                            </button>
                        </div>
                        <div id="output-content" class="output-content">
                            <span style="color: #666;">点击"运行"按钮执行代码...</span>
                        </div>
                    </div>
                </div>
                
                ${practice.solution ? `
                <div class="answer-section" id="answer-section">
                    <h4><i class="bi bi-check-circle-fill text-success"></i> 参考答案</h4>
                    <div class="code-block">
                        <div class="code-header"><span class="code-lang">Python</span></div>
                        <pre class="code-content"><code>${escapeHtml(practice.solution)}</code></pre>
                    </div>
                    <button class="btn-tool mt-3" onclick="markComplete()">
                        <i class="bi bi-check-lg"></i> 标记完成
                    </button>
                </div>
                
                <button class="btn-tool mt-3" onclick="toggleAnswer()">
                    <i class="bi bi-eye"></i> 查看答案
                </button>
                ` : ''}
            `;
            
            // 初始化CodeMirror
            setTimeout(() => {
                if (editor) editor.toTextArea();
                const textarea = document.getElementById('practice-code');
                if (textarea) {
                    editor = CodeMirror.fromTextArea(textarea, {
                        mode: 'python',
                        theme: 'monokai',
                        lineNumbers: true,
                        indentUnit: 4,
                        lineWrapping: true
                    });
                }
            }, 100);
        }
        
        // ==================== 模式切换 ====================
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.toggle('active', section.id === mode + '-content');
            });
        }
        
        // ==================== 代码运行 ====================
        function runCode() {
            const output = document.getElementById('output-content');
            const code = editor ? editor.getValue() : '';
            
            output.innerHTML = '<span style="color: #666;">运行中...</span>';
            
            Sk.configure({
                output: function(text) {
                    output.innerHTML += text.replace(/\n/g, '<br>');
                },
                read: function(x) {
                    if (Sk.builtinFiles === undefined || Sk.builtinFiles.files[x] === undefined) {
                        throw "File not found: '" + x + "'";
                    }
                    return Sk.builtinFiles.files[x];
                }
            });
            
            Sk.misceval.asyncToPromise(function() {
                return Sk.importMainWithBody("<stdin>", false, code, true);
            }).then(
                function() {
                    output.innerHTML += '<br><span style="color: #43e97b;">[OK] 运行成功</span>';
                },
                function(err) {
                    output.innerHTML += '<br><span style="color: #fa709a;">[X] Error: ' + err.toString() + '</span>';
                }
            );
        }
        
        // ==================== 工具函数 ====================
        function clearOutput() {
            document.getElementById('output-content').innerHTML = '<span style="color: #666;">输出已清空...</span>';
        }
        
        function resetCode() {
            const project = projects.find(p => p.id === currentProject);
            if (editor && project && project.practice && project.practice.template) {
                editor.setValue(project.practice.template);
            }
        }
        
        function toggleAnswer() {
            document.getElementById('answer-section').classList.toggle('show');
        }
        
        function copyCode(btn) {
            const code = btn.closest('.code-block').querySelector('code').textContent;
            navigator.clipboard.writeText(code);
            btn.innerHTML = '<i class="bi bi-check"></i> 已复制';
            setTimeout(() => btn.innerHTML = '<i class="bi bi-clipboard"></i> 复制', 2000);
        }
        
        function checkAnswer(element, isCorrect, questionIdx) {
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');
            
            if (isCorrect) {
                element.classList.add('correct');
                element.innerHTML += ' [OK]';
            } else {
                element.classList.add('wrong');
                element.innerHTML += ' [X]';
            }
        }
        
        function markComplete() {
            if (!completedProjects.includes(currentProject)) {
                completedProjects.push(currentProject);
                localStorage.setItem('completedProjects', JSON.stringify(completedProjects));
                updateProgress();
                alert('恭喜完成本项目！');
            }
        }
        
        function updateProgress() {
            document.getElementById('progress-text').textContent = completedProjects.length + '/' + projects.length;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 启动
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
